<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เซียมซี TCAS กอดคอสอบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark:  #2d7a2d;
            --green-mid:   #3fa83f;
            --green-bright:#5abf5a;
            --green-light: #7ed87e;
            --lime:        #a8e063;
            --yellow:      #f7e04b;
            --yellow-deep: #e8c414;
            --cream:       #fffde7;
            --white:       #ffffff;
            --text-dark:   #1b4d1b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #c8efc8 0%, #e8f5e9 50%, #b9e6b9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* grass strips */
        .grass-top, .grass-bot {
            position: fixed; left: 0; right: 0;
            height: 52px; pointer-events: none; z-index: 1; overflow: hidden;
        }
        .grass-top { top: 0; }
        .grass-bot { bottom: 0; }
        .grass-top svg, .grass-bot svg { width: 100%; height: 100%; }

        /* floating leaves */
        .leaves { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .leaf {
            position: absolute; font-size: var(--ls,18px); opacity: 0;
            animation: leafDrift var(--ld,8s) var(--ldelay,0s) infinite ease-in-out;
        }
        @keyframes leafDrift {
            0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            8%   { opacity: 0.7; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(var(--lrot,360deg)) translateX(var(--lx,30px)); opacity: 0; }
        }

        /* fireworks canvas */
        #fireworksCanvas {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 200;
        }

        /* wrapper */
        .wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 16px 80px; width: 100%; max-width: 480px;
        }

        /* header bubble */
        .header-bubble {
            background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
            border-radius: 50px;
            padding: 14px 36px;
            text-align: center;
            box-shadow: 0 6px 0 #1e5e1e, 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 28px;
            position: relative;
        }
        .header-bubble::after {
            content: ''; position: absolute;
            bottom: -10px; left: 50%; transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: var(--green-mid); border-bottom: none;
        }
        .title {
            font-family: 'Kanit', sans-serif; font-weight: 900;
            font-size: clamp(22px, 6vw, 34px);
            color: var(--yellow);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 13px; color: rgba(255,253,231,0.85); margin-top: 4px;
        }

        /* main card */
        .fortune-box {
            width: 100%; background: white;
            border-radius: 28px; padding: 30px 24px 24px;
            box-shadow: 0 8px 0 #2d8a2d, 0 12px 30px rgba(0,0,0,0.13);
            border: 3px solid var(--green-bright); position: relative; overflow: hidden;
        }
        .fortune-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
            background: repeating-linear-gradient(90deg, var(--green-bright) 0 12px, var(--lime) 12px 20px);
        }

        .section-label {
            display: inline-block;
            background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
            color: white; font-family: 'Kanit', sans-serif; font-weight: 700;
            font-size: 13px; padding: 4px 16px; border-radius: 20px;
            margin-bottom: 18px; box-shadow: 0 3px 0 #2a7a2a;
        }

        /* tube */
        .tube-area {
            display: flex; flex-direction: column; align-items: center;
            gap: 16px; margin-bottom: 20px;
        }
        .tube-wrapper {
            position: relative; width: 90px; height: 150px;
            cursor: pointer; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.22));
        }
        .tube {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #8B6914, #5d3a1a 40%, #3d2008 70%, #6b4c15);
            border-radius: 12px 12px 8px 8px;
            box-shadow: inset -4px 0 8px rgba(0,0,0,0.4), inset 4px 0 8px rgba(255,255,255,0.08);
        }
        .tube::before, .tube::after {
            content: ''; position: absolute; left: 50%; transform: translateX(-50%);
            width: 88%; height: 9px;
            background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(0,0,0,0.15));
            border-radius: 50%;
        }
        .tube::before { top: 28px; }
        .tube::after  { top: 85px; }
        .sticks {
            position: absolute; top: -14px; left: 50%;
            transform: translateX(-50%); width: 66px; height: 75px;
        }
        .stick {
            position: absolute; bottom: 0; width: 5px; border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, #f5deb3, #d2a06a, #a0682a);
            transform-origin: bottom center; box-shadow: 1px 0 2px rgba(0,0,0,0.3);
        }
        .tube-wrapper.shaking .tube   { animation: shakeIt 0.65s ease-in-out; }
        .tube-wrapper.shaking .sticks { animation: sticksRattle 0.65s ease-in-out; }
        @keyframes shakeIt {
            0%  {transform:rotate(0deg)}
            10% {transform:rotate(-16deg) translateX(-5px)}
            25% {transform:rotate(20deg)  translateX(5px)}
            40% {transform:rotate(-22deg) translateX(-8px)}
            55% {transform:rotate(24deg)  translateX(6px)}
            70% {transform:rotate(-13deg) translateX(-4px)}
            85% {transform:rotate(8deg)   translateX(2px)}
            100%{transform:rotate(0deg)}
        }
        @keyframes sticksRattle {
            0%,100%{transform:translateX(-50%) rotate(0deg)}
            15%{transform:translateX(-55%) rotate(-10deg)}
            35%{transform:translateX(-45%) rotate(12deg)}
            55%{transform:translateX(-52%) rotate(-8deg)}
            75%{transform:translateX(-48%) rotate(6deg)}
        }
        .shake-hint {
            font-size: 12px; color: var(--green-dark); opacity: 0.6;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.6} 50%{opacity:1} }

        /* button */
        .btn {
            display: block; width: 100%; padding: 16px;
            font-family: 'Kanit', sans-serif; font-size: 20px;
            font-weight: 700; letter-spacing: 1px;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--yellow), #ffe033, var(--yellow-deep));
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 0 #b8960a, 0 8px 20px rgba(232,196,20,0.3);
            transition: transform .12s, box-shadow .12s;
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 55%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-20deg);
            animation: shine 3s .5s ease-in-out infinite;
        }
        @keyframes shine { 0%{left:-100%} 40%,100%{left:150%} }
        .btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #b8960a, 0 12px 24px rgba(232,196,20,0.4); }
        .btn:active { transform: translateY(3px);  box-shadow: 0 2px 0 #b8960a; }
        .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        .divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--green-light), transparent);
            margin: 18px 0;
        }
        .count-badge {
            text-align: center; font-size: 12px;
            color: var(--green-dark); opacity: 0.6;
            font-family: 'Kanit', sans-serif;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,50,15,0.55);
            backdrop-filter: blur(5px);
            z-index: 300;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity .3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal-card {
            position: relative;
            background: white;
            border: 4px solid var(--green-bright);
            border-radius: 28px;
            padding: 46px 26px 26px;
            max-width: 400px; width: 100%;
            box-shadow: 0 10px 0 #2a7a2a, 0 16px 40px rgba(0,0,0,0.18);
            transform: scale(0.6) translateY(60px);
            transition: transform .5s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
            opacity: 0; overflow: hidden;
        }
        .modal-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px;
            background: repeating-linear-gradient(90deg, var(--green-bright) 0 14px, var(--lime) 14px 22px);
        }
        .modal-overlay.open .modal-card { transform: scale(1) translateY(0); opacity: 1; }

        .modal-icon {
            position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
            font-size: 40px;
            animation: popIn .5s cubic-bezier(.34,1.56,.64,1) .15s both;
        }
        @keyframes popIn {
            0%  {transform:translateX(-50%) scale(0) rotate(-20deg)}
            100%{transform:translateX(-50%) scale(1) rotate(0deg)}
        }

        .modal-num {
            display: inline-block;
            background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
            color: white; font-family: 'Kanit', sans-serif; font-weight: 700;
            font-size: 12px; padding: 5px 20px; border-radius: 20px;
            letter-spacing: 2px; margin-bottom: 18px; box-shadow: 0 3px 0 #1e6e1e;
        }

        .modal-body { text-align: center; }

        .modal-text {
            font-size: clamp(15px,4vw,17px); line-height: 1.85;
            color: var(--text-dark); margin-bottom: 24px; font-weight: 400;
        }

        .modal-close {
            display: block; width: 100%; padding: 14px;
            font-family: 'Kanit', sans-serif; font-size: 16px; font-weight: 700;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--yellow), #ffe033);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 0 #b8960a;
            transition: transform .12s, box-shadow .12s;
        }
        .modal-close:hover  { transform: translateY(-2px); }
        .modal-close:active { transform: translateY(2px); box-shadow: 0 1px 0 #b8960a; }

        .modal-confetti { position: absolute; inset: 0; pointer-events: none; border-radius: 24px; overflow: hidden; }
        .conf-dot {
            position: absolute; width: 7px; height: 7px; border-radius: 50%; opacity: 0;
            animation: confPop var(--cd,.8s) var(--cdelay,0s) ease-out forwards;
        }
        @keyframes confPop {
            0%  {transform:translate(0,0) scale(0); opacity:1}
            100%{transform:translate(var(--cx),var(--cy)) scale(.4); opacity:0}
        }
    </style>
</head>
<body>

<!-- Grass top -->
<div class="grass-top">
    <svg viewBox="0 0 1440 52" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1440" height="52" fill="#2d7a2d"/>
        <ellipse cx="60"  cy="52" rx="50" ry="36" fill="#3fa83f"/>
        <ellipse cx="190" cy="52" rx="42" ry="30" fill="#5abf5a"/>
        <ellipse cx="310" cy="52" rx="58" ry="40" fill="#3fa83f"/>
        <ellipse cx="460" cy="52" rx="46" ry="34" fill="#5abf5a"/>
        <ellipse cx="600" cy="52" rx="54" ry="38" fill="#3fa83f"/>
        <ellipse cx="750" cy="52" rx="48" ry="36" fill="#5abf5a"/>
        <ellipse cx="900" cy="52" rx="56" ry="40" fill="#3fa83f"/>
        <ellipse cx="1060" cy="52" rx="44" ry="32" fill="#5abf5a"/>
        <ellipse cx="1210" cy="52" rx="52" ry="38" fill="#3fa83f"/>
        <ellipse cx="1370" cy="52" rx="46" ry="34" fill="#5abf5a"/>
    </svg>
</div>

<!-- Grass bottom -->
<div class="grass-bot">
    <svg viewBox="0 0 1440 52" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1440" height="52" fill="#2d7a2d"/>
        <ellipse cx="60"  cy="0" rx="50" ry="36" fill="#3fa83f"/>
        <ellipse cx="190" cy="0" rx="42" ry="30" fill="#5abf5a"/>
        <ellipse cx="310" cy="0" rx="58" ry="40" fill="#3fa83f"/>
        <ellipse cx="460" cy="0" rx="46" ry="34" fill="#5abf5a"/>
        <ellipse cx="600" cy="0" rx="54" ry="38" fill="#3fa83f"/>
        <ellipse cx="750" cy="0" rx="48" ry="36" fill="#5abf5a"/>
        <ellipse cx="900" cy="0" rx="56" ry="40" fill="#3fa83f"/>
        <ellipse cx="1060" cy="0" rx="44" ry="32" fill="#5abf5a"/>
        <ellipse cx="1210" cy="0" rx="52" ry="38" fill="#3fa83f"/>
        <ellipse cx="1370" cy="0" rx="46" ry="34" fill="#5abf5a"/>
    </svg>
</div>

<div class="leaves" id="leaves"></div>
<canvas id="fireworksCanvas"></canvas>

<div class="wrapper">
    <div class="header-bubble">
        <div class="title">🥢 เซียมซี TCAS 🥢</div>
        <div class="subtitle">เขย่าเซียมซีรับพลังใจก่อนลงสนามสอบ!</div>
    </div>

    <div class="fortune-box">
        <div style="text-align:center">
            <span class="section-label">🌿 กระบอกเซียมซีวิเศษ 🌿</span>
        </div>

        <div class="tube-area">
            <div class="tube-wrapper" id="tubeWrapper" onclick="handleShake()" title="คลิกเพื่อเขย่า">
                <div class="tube"></div>
                <div class="sticks" id="sticks"></div>
            </div>
            <div class="shake-hint" id="shakeHint">👆 คลิกกระบอก หรือกดปุ่มด้านล่าง</div>
        </div>

        <button class="btn" id="mainBtn" onclick="drawFortune()">🥢 เขย่าเซียมซีเลย!</button>

        <div class="divider"></div>
        <div class="count-badge" id="countBadge">เขย่าแล้ว 0 ครั้ง · โชคดีทุกคนนะ 🙏</div>
    </div>
</div>

<!-- POPUP MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-card" id="modalCard">
        <div class="modal-confetti" id="modalConfetti"></div>
        <div class="modal-icon">🌟</div>
        <div class="modal-body">
            <div class="modal-num" id="modalNum">ใบที่ ๑</div>
            <p class="modal-text" id="modalText"></p>
            <button class="modal-close" onclick="closeModalDirect()">🌿 รับพลัง แล้วลุยเลย! 🌿</button>
        </div>
    </div>
</div>

<script>
const fortunes = [
    "พอร์ตโฟลิโอไม่ใช่การประกวดคนเก่งที่สุด แต่คือการพรีเซนต์คนที่ 'ใช่' ที่สุด และน้องคือคนนั้น!",
    "อย่าเพิ่งคิดแทนกรรมการ หน้าที่ของเราคือทำผลงานให้ดีที่สุด หน้าที่ตัดสินใจปล่อยให้เป็นของเขา",
    "ความตื่นเต้นแปลว่าเราใส่ใจ เปลี่ยนความกังวลเป็นพลังในการตรวจทานพอร์ตอีกรอบนะ",
    "ไม่มีผลงานไหนที่ไร้ค่า ทุกกิจกรรมที่ทำมาคือจิ๊กซอว์ชิ้นสำคัญที่ประกอบเป็นตัวน้องในวันนี้",
    "เชื่อมั่นในตัวเองให้เท่ากับที่เพื่อนสนิทและครอบครัวเชื่อในตัวน้องนะ ทำได้แน่นอน!",
    "ความกลัวมักจะหลอกให้เราดูตัวเล็กลงเสมอ กางพอร์ตออกมาแล้วดูสิว่าเราผ่านอะไรมาบ้าง เราเก่งกว่าที่คิดนะ!",
    "กรรมการไม่ได้มองหาคนที่สมบูรณ์แบบ เขามองหาคนที่มีแพชชันและพร้อมจะเรียนรู้",
    "น้องมีที่ยืนในมหาวิทยาลัยเสมอ แค่ต้องหาคณะที่เคมีตรงกันให้เจอ ลุย!",
    "ทัศนคติที่ว่า 'ฉันทำได้' คือผลงานชิ้นแรกที่มองไม่เห็น แต่กรรมการสัมผัสได้จากตัวอักษร",
    "วันนี้อาจจะดูยาก แต่พอผ่านไปได้ มันจะเป็นสตอรี่ที่เท่ที่สุดในการเล่าให้รุ่นน้องฟัง",
    "เขียน SOP ไม่ออกไม่เป็นไร วันนี้พิมพ์ได้แค่หนึ่งบรรทัด ก็ถือว่าก้าวไปข้างหน้าแล้วนะ",
    "ความสมบูรณ์แบบไม่มีอยู่จริง ส่งพอร์ตที่ดีที่สุดในเวอร์ชันของเราตอนนี้ไปเลย!",
    "อย่ามัวแต่กังวลจนลืมลงมือทำ เริ่มจัดหน้ากระดาษตั้งแต่วันนี้ ดีกว่าไปปั่นไฟลุกคืนสุดท้ายนะ",
    "10 หน้ากระดาษอาจจะดูเยอะ แต่ถ้าแบ่งทำวันละ 1 หน้า 10 วันก็เสร็จแล้ว ฮึบ!",
    "ตรวจคำผิดรอบที่สามแล้วใช่ไหม? ดีมาก! ความใส่ใจในรายละเอียดคือคะแนนพิศวาสที่ใครก็แย่งไปไม่ได้",
    "ผลงานระดับชาติไม่มี ไม่เป็นไร! หยิบผลงานระดับโรงเรียนมาเล่าให้เห็นทักษะการแก้ปัญหา เจ๋งกว่าเยอะ!",
    "ก้าวเล็กๆ อย่างการนั่งคัดรูปใส่พอร์ตวันนี้ จะพาเราไปสู่ก้าวที่ยิ่งใหญ่ในวันประกาศผล",
    "ไอเดียตันให้ลุกไปอาบน้ำ ปล่อยสมองโล่งๆ แล้วค่อยกลับมาเขียนแคปชันผลงานใหม่",
    "เซฟไฟล์เป็น PDF หรือยัง? อย่าลืมแบคอัปข้อมูลไว้หลายๆ ที่นะ ความรอบคอบคืออาวุธของผู้ชนะ!",
    "ถ้าวันนี้เหนื่อยจนจัดหน้าพอร์ตไม่ไหว แค่นั่งลิสต์ผลงานลงกระดาษก็ถือว่าเก่งมากๆ แล้ว",
    "เลิกส่องพอร์ตเพื่อนเดี๋ยวนี้! เส้นทางของใครของมัน ดอกไม้แต่ละดอกบานไม่พร้อมกันนะ",
    "เพื่อนมีเกียรติบัตร 100 ใบ ก็สู้เราที่มี 5 ใบแต่ตรงสเปกที่คณะต้องการเป๊ะๆ ไม่ได้หรอก มั่นใจเข้าไว้!",

    "'หนูจะติดไหม?' คำถามนี้ไม่มีใครตอบได้ แต่ถ้าไม่ยื่นพอร์ตเลย เปอร์เซ็นต์ติดคือ 0% นะ สู้ดิวะ!",

/* ── FIREWORKS ENGINE ── */
const canvas = document.getElementById('fireworksCanvas');
const ctx    = canvas.getContext('2d');
let fwParts  = [], fwRaf = null, fwStopAt = 0;

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const FW_COLORS = ['#f7e04b','#5abf5a','#a8e063','#fff','#ff7675','#7ed87e','#ffe033','#b5f57a','#74b9ff','#fd79a8'];

function launchBurst() {
    const x = Math.random()*canvas.width;
    const y = Math.random()*canvas.height*0.55 + 30;
    const color = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
    const n = 55 + Math.floor(Math.random()*35);
    for (let i = 0; i < n; i++) {
        const a = (Math.PI*2/n)*i + (Math.random()-.5)*.3;
        const sp = 2.5 + Math.random()*4.5;
        fwParts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
            alpha:1, color, r: 2+Math.random()*2.2,
            decay: .011+Math.random()*.012, g: .055 });
    }
}

function fwLoop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const p of fwParts) {
        p.x += p.vx; p.y += p.vy; p.vy += p.g;
        p.vx *= .97;  p.alpha -= p.decay;
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    fwParts = fwParts.filter(p => p.alpha > 0);
    if (fwParts.length > 0 || Date.now() < fwStopAt)
        fwRaf = requestAnimationFrame(fwLoop);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
}

function startFireworks(duration, onDone) {
    fwParts  = [];
    fwStopAt = Date.now() + duration;
    launchBurst();
    const iv = setInterval(() => {
        if (Date.now() < fwStopAt) launchBurst();
        else { clearInterval(iv); setTimeout(onDone, 350); }
    }, 200);
    if (fwRaf) cancelAnimationFrame(fwRaf);
    fwRaf = requestAnimationFrame(fwLoop);
}

/* ── MODAL CONFETTI ── */
function spawnConfetti() {
    const el = document.getElementById('modalConfetti');
    el.innerHTML = '';
    const cols = ['#f7e04b','#5abf5a','#a8e063','#3fa83f','#ffe033','#b5f57a','#ff9f43'];
    for (let i = 0; i < 24; i++) {
        const d = document.createElement('div');
        d.className = 'conf-dot';
        const a = Math.random()*Math.PI*2, dist = 70+Math.random()*130;
        d.style.cssText = `left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;background:${cols[Math.floor(Math.random()*cols.length)]};--cx:${Math.cos(a)*dist}px;--cy:${Math.sin(a)*dist}px;--cd:${.5+Math.random()*.7}s;--cdelay:${Math.random()*.25}s;`;
        el.appendChild(d);
    }
}

/* ── MODAL ── */
function openModal(text, numLabel) {
    document.getElementById('modalText').textContent = text;
    document.getElementById('modalNum').textContent  = `🌿 ${numLabel}`;
    document.getElementById('modalOverlay').classList.add('open');
    spawnConfetti();
}
function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
    setTimeout(() => {
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('shakeHint').style.opacity = '';
        isAnimating = false;
    }, 350);
}

function handleShake() { if (!isAnimating) drawFortune(); }

function drawFortune() {
    if (isAnimating) return;
    isAnimating = true;

    const btn  = document.getElementById('mainBtn');
    const tube = document.getElementById('tubeWrapper');
    const hint = document.getElementById('shakeHint');

    btn.disabled = true;
    hint.style.opacity = '0';
    tube.classList.add('shaking');

    setTimeout(() => {
        tube.classList.remove('shaking');

        let idx;
        do { idx = Math.floor(Math.random()*fortunes.length); }
        while (idx === lastIndex && fortunes.length > 1);
        lastIndex = idx;
        shakeCount++;

        document.getElementById('countBadge').textContent =
            `เขย่าแล้ว ${shakeCount} ครั้ง · โชคดีทุกคนนะ 🙏`;

        // 🎆 Fireworks → then popup
        startFireworks(1400, () => openModal(fortunes[idx], fortuneNums[idx]));

    }, 700);
}
