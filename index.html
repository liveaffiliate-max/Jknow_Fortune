<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เซียมซี TCAS กอดคอสอบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #c0392b;
            --gold: #f39c12;
            --gold-light: #f9d662;
            --dark-red: #7b1a12;
            --cream: #fdf6e3;
            --brown: #5d3a1a;
            --smoke: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #1a0a02;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background */
        .bg-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(192,57,43,0.25) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 100%, rgba(120,40,10,0.3) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 80% 100%, rgba(180,90,10,0.2) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Floating particles */
        .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--gold-light);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp var(--dur, 6s) var(--delay, 0s) infinite ease-in-out;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5) translateX(var(--drift, 20px)); opacity: 0; }
        }

        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Temple header */
        .temple-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .temple-icon {
            font-size: 52px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(243,156,18,0.8));
            animation: iconFloat 3s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .title {
            font-family: 'Kanit', sans-serif;
            font-weight: 900;
            font-size: clamp(28px, 7vw, 42px);
            color: var(--gold-light);
            text-shadow: 0 0 30px rgba(243,156,18,0.6), 0 2px 0 rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-top: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(253,246,227,0.6);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* Fortune container */
        .fortune-box {
            width: 100%;
            background: linear-gradient(160deg, rgba(90,30,10,0.6), rgba(30,10,5,0.8));
            border: 1px solid rgba(243,156,18,0.3);
            border-radius: 20px;
            padding: 28px 24px;
            backdrop-filter: blur(10px);
            box-shadow:
                0 0 40px rgba(192,57,43,0.2),
                inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .fortune-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        /* The tube container */
        .tube-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .tube-wrapper {
            position: relative;
            width: 100px;
            height: 160px;
            cursor: pointer;
        }

        /* Bamboo tube */
        .tube {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #8B6914, #5d3a1a 40%, #3d2008 70%, #6b4c15);
            border-radius: 12px 12px 8px 8px;
            box-shadow:
                inset -4px 0 8px rgba(0,0,0,0.4),
                inset 4px 0 8px rgba(255,255,255,0.08),
                0 8px 30px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        /* Tube rings */
        .tube::before, .tube::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15), rgba(0,0,0,0.2));
            border-radius: 50%;
        }
        .tube::before { top: 30px; }
        .tube::after { top: 90px; }

        /* Sticks inside */
        .sticks {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 80px;
        }
        .stick {
            position: absolute;
            bottom: 0;
            width: 5px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, #f5deb3, #d2a06a, #a0682a);
            transform-origin: bottom center;
            box-shadow: 1px 0 2px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        /* Shake animation */
        .tube-wrapper.shaking .tube {
            animation: shakeIt 0.6s ease-in-out;
        }
        .tube-wrapper.shaking .sticks {
            animation: sticksRattle 0.6s ease-in-out;
        }
        @keyframes shakeIt {
            0%   { transform: rotate(0deg); }
            10%  { transform: rotate(-15deg) translateX(-5px); }
            25%  { transform: rotate(18deg) translateX(5px); }
            40%  { transform: rotate(-20deg) translateX(-8px); }
            55%  { transform: rotate(22deg) translateX(6px); }
            70%  { transform: rotate(-12deg) translateX(-4px); }
            85%  { transform: rotate(8deg) translateX(2px); }
            100% { transform: rotate(0deg); }
        }
        @keyframes sticksRattle {
            0%,100% { transform: translateX(-50%) rotate(0deg); }
            15% { transform: translateX(-55%) rotate(-10deg); }
            35% { transform: translateX(-45%) rotate(12deg); }
            55% { transform: translateX(-52%) rotate(-8deg); }
            75% { transform: translateX(-48%) rotate(6deg); }
        }

        /* Falling stick */
        .falling-stick {
            position: absolute;
            width: 5px;
            height: 80px;
            background: linear-gradient(180deg, #f5deb3, #d2a06a, #a0682a);
            border-radius: 3px;
            transform-origin: top center;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        .falling-stick.fall {
            animation: stickFall 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes stickFall {
            0%   { opacity: 1; transform: rotate(0deg) translateY(0); }
            30%  { transform: rotate(15deg) translateY(20px); }
            70%  { transform: rotate(40deg) translateY(60px); opacity: 1; }
            100% { transform: rotate(70deg) translateY(120px) translateX(40px); opacity: 0; }
        }

        .shake-hint {
            font-size: 12px;
            color: rgba(253,246,227,0.45);
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 0.9; }
        }

        /* Btn */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-family: 'Kanit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #1a0a02;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #e67e22, var(--gold));
            background-size: 300% 300%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(243,156,18,0.4), 0 0 40px rgba(243,156,18,0.1);
            transition: transform 0.15s, box-shadow 0.15s;
            animation: goldShimmer 3s ease infinite;
            position: relative;
            overflow: hidden;
        }
        @keyframes goldShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: btnShine 3s 1s ease-in-out infinite;
        }
        @keyframes btnShine {
            0% { left: -100%; }
            40%, 100% { left: 150%; }
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(243,156,18,0.6); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Count badge */
        .count-badge {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: rgba(253,246,227,0.35);
            font-family: 'Kanit', sans-serif;
        }

        /* ===== POPUP MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,3,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            position: relative;
            background: linear-gradient(160deg, #3b1205, #1e0900);
            border: 1px solid rgba(243,156,18,0.45);
            border-radius: 24px;
            padding: 40px 28px 28px;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 0 60px rgba(192,57,43,0.35),
                0 0 120px rgba(243,156,18,0.1),
                inset 0 1px 0 rgba(255,255,255,0.06);
            transform: scale(0.7) translateY(40px);
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            opacity: 0;
        }
        .modal-overlay.open .modal-card {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Gold top bar */
        .modal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            border-radius: 2px;
        }

        /* Stick flying out icon at top */
        .modal-stick-icon {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            filter: drop-shadow(0 0 12px rgba(243,156,18,0.9));
            animation: iconBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }
        @keyframes iconBounce {
            0% { transform: translateX(-50%) scale(0) rotate(-30deg); }
            100% { transform: translateX(-50%) scale(1) rotate(0deg); }
        }

        /* Fortune number badge on modal */
        .modal-num {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #1a0a02;
            font-family: 'Kanit', sans-serif;
            font-weight: 700;
            font-size: 12px;
            padding: 4px 18px;
            border-radius: 20px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .modal-body {
            text-align: center;
        }

        .modal-text {
            font-size: clamp(15px, 4vw, 18px);
            line-height: 1.85;
            color: var(--cream);
            font-weight: 400;
            margin-bottom: 28px;
        }

        /* Close button */
        .modal-close {
            display: block;
            width: 100%;
            padding: 13px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--gold-light);
            background: rgba(243,156,18,0.08);
            border: 1px solid rgba(243,156,18,0.3);
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .modal-close:hover {
            background: rgba(243,156,18,0.18);
            transform: translateY(-1px);
        }
        .modal-close:active { transform: translateY(1px); }

        /* Confetti dots inside modal */
        .modal-confetti {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 24px;
            overflow: hidden;
        }
        .conf-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: confPop var(--cd, 0.8s) var(--cdelay, 0s) ease-out forwards;
        }
        @keyframes confPop {
            0% { transform: translate(0,0) scale(0); opacity: 1; }
            100% { transform: translate(var(--cx), var(--cy)) scale(0.5); opacity: 0; }
        }

        /* Incense smoke */
        .smoke-container {
            position: absolute;
            top: 0; left: 0; right: 0;
            pointer-events: none;
            height: 80px;
            overflow: hidden;
        }
        .smoke-wisp {
            position: absolute;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15));
            border-radius: 50%;
            animation: smokeDrift var(--sd, 4s) var(--sdelay, 0s) ease-in-out infinite;
            transform-origin: bottom center;
        }
        @keyframes smokeDrift {
            0% { transform: scaleX(1) translateY(0); opacity: 0; height: 0; }
            20% { opacity: 0.6; }
            60% { transform: scaleX(3) translateY(-40px) rotate(5deg); }
            100% { transform: scaleX(5) translateY(-80px) rotate(-8deg); opacity: 0; height: 60px; }
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(243,156,18,0.3), transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="wrapper">
    <div class="temple-header">
        <span class="temple-icon">🏮</span>
        <div class="title">เซียมซี TCAS</div>
        <div class="subtitle">เขย่าเซียมซีรับพลังใจก่อนลงสนามสอบ</div>
    </div>

    <div class="fortune-box">
        <div class="smoke-container" id="smokeContainer"></div>

        <div class="tube-area">
            <div class="tube-wrapper" id="tubeWrapper" onclick="handleShake()" title="คลิกเพื่อเขย่า">
                <div class="tube"></div>
                <div class="sticks" id="sticks"></div>
            </div>
            <div class="shake-hint" id="shakeHint">👆 คลิกที่กระบอกเพื่อเขย่า หรือ</div>
        </div>

        <button class="btn" id="mainBtn" onclick="drawFortune()">🥢 เขย่าเซียมซีเลย!</button>

        <div class="divider"></div>
        <div class="count-badge" id="countBadge">เขย่าแล้ว 0 ครั้ง · โชคดีทุกคนนะ 🙏</div>
    </div>
</div>

<!-- POPUP MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-card" id="modalCard">
        <div class="modal-confetti" id="modalConfetti"></div>
        <div class="modal-stick-icon">🥢</div>
        <div class="modal-body">
            <div class="modal-num" id="modalNum">ใบที่ ๑</div>
            <p class="modal-text" id="modalText"></p>
            <button class="modal-close" onclick="closeModalDirect()">✨ รับพลัง แล้วลุยเลย!</button>
        </div>
    </div>
</div>

<script>
const fortunes = [
    "พอร์ตโฟลิโอไม่ใช่การประกวดคนเก่งที่สุด แต่คือการพรีเซนต์คนที่ 'ใช่' ที่สุด และน้องคือคนนั้น!",
    "อย่าเพิ่งคิดแทนกรรมการ หน้าที่ของเราคือทำผลงานให้ดีที่สุด หน้าที่ตัดสินใจปล่อยให้เป็นของเขา",
    "ความตื่นเต้นแปลว่าเราใส่ใจ เปลี่ยนความกังวลเป็นพลังในการตรวจทานพอร์ตอีกรอบนะ",
    "ไม่มีผลงานไหนที่ไร้ค่า ทุกกิจกรรมที่ทำมาคือจิ๊กซอว์ชิ้นสำคัญที่ประกอบเป็นตัวน้องในวันนี้",
    "เชื่อมั่นในตัวเองให้เท่ากับที่เพื่อนสนิทและครอบครัวเชื่อในตัวน้องนะ ทำได้แน่นอน!",
    "ความกลัวมักจะหลอกให้เราดูตัวเล็กลงเสมอ กางพอร์ตออกมาแล้วดูสิว่าเราผ่านอะไรมาบ้าง เราเก่งกว่าที่คิดนะ!",
    "กรรมการไม่ได้มองหาคนที่สมบูรณ์แบบ เขามองหาคนที่มีแพชชันและพร้อมจะเรียนรู้",
    "น้องมีที่ยืนในมหาวิทยาลัยเสมอ แค่ต้องหาคณะที่เคมีตรงกันให้เจอ ลุย!",
    "ทัศนคติที่ว่า 'ฉันทำได้' คือผลงานชิ้นแรกที่มองไม่เห็น แต่กรรมการสัมผัสได้จากตัวอักษร",
    "วันนี้อาจจะดูยาก แต่พอผ่านไปได้ มันจะเป็นสตอรี่ที่เท่ที่สุดในการเล่าให้รุ่นน้องฟัง",
    "เขียน SOP ไม่ออกไม่เป็นไร วันนี้พิมพ์ได้แค่หนึ่งบรรทัด ก็ถือว่าก้าวไปข้างหน้าแล้วนะ",
    "ความสมบูรณ์แบบไม่มีอยู่จริง ส่งพอร์ตที่ดีที่สุดในเวอร์ชันของเราตอนนี้ไปเลย!",
    "อย่ามัวแต่กังวลจนลืมลงมือทำ เริ่มจัดหน้ากระดาษตั้งแต่วันนี้ ดีกว่าไปปั่นไฟลุกคืนสุดท้ายนะ",
    "10 หน้ากระดาษอาจจะดูเยอะ แต่ถ้าแบ่งทำวันละ 1 หน้า 10 วันก็เสร็จแล้ว ฮึบ!",
    "ตรวจคำผิดรอบที่สามแล้วใช่ไหม? ดีมาก! ความใส่ใจในรายละเอียดคือคะแนนพิศวาสที่ใครก็แย่งไปไม่ได้",
    "ผลงานระดับชาติไม่มี ไม่เป็นไร! หยิบผลงานระดับโรงเรียนมาเล่าให้เห็นทักษะการแก้ปัญหา เจ๋งกว่าเยอะ!",
    "ก้าวเล็กๆ อย่างการนั่งคัดรูปใส่พอร์ตวันนี้ จะพาเราไปสู่ก้าวที่ยิ่งใหญ่ในวันประกาศผล",
    "ไอเดียตันให้ลุกไปอาบน้ำ ปล่อยสมองโล่งๆ แล้วค่อยกลับมาเขียนแคปชันผลงานใหม่",
    "เซฟไฟล์เป็น PDF หรือยัง? อย่าลืมแบคอัปข้อมูลไว้หลายๆ ที่นะ ความรอบคอบคืออาวุธของผู้ชนะ!",
    "ถ้าวันนี้เหนื่อยจนจัดหน้าพอร์ตไม่ไหว แค่นั่งลิสต์ผลงานลงกระดาษก็ถือว่าเก่งมากๆ แล้ว",
    "เลิกส่องพอร์ตเพื่อนเดี๋ยวนี้! เส้นทางของใครของมัน ดอกไม้แต่ละดอกบานไม่พร้อมกันนะ",
    "เพื่อนมีเกียรติบัตร 100 ใบ ก็สู้เราที่มี 5 ใบแต่ตรงสเปกที่คณะต้องการเป๊ะๆ ไม่ได้หรอก มั่นใจเข้าไว้!",
    "รู้สึกว่าตัวเองธรรมดาไปเหรอ? ความธรรมดานี่แหละที่เข้าถึงง่ายและจริงใจที่สุด เล่ามันออกมาเลย",
    "'หนูจะติดไหม?' คำถามนี้ไม่มีใครตอบได้ แต่ถ้าไม่ยื่นพอร์ตเลย เปอร์เซ็นต์ติดคือ 0% นะ สู้ดิวะ!",

const fortuneNums = [
    "ซีที่ ๑","ซีที่ ๒","ซีที่ ๓","ซีที่ ๔","ซีที่ ๕",
    "ซีที่ ๖","ซีที่ ๗","ซีที่ ๘","ซีที่ ๙","ซีที่ ๑๐"
];

let isAnimating = false;
let shakeCount = 0;
let lastIndex = -1;

// Build particles
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%; --dur:${4+Math.random()*8}s; --delay:${Math.random()*8}s; --drift:${(Math.random()-0.5)*60}px;`;
    particlesEl.appendChild(p);
}

// Build sticks inside tube
const sticksEl = document.getElementById('sticks');
const stickData = [
    {left:'15%', height:'65px', rot:'-12deg'},
    {left:'28%', height:'72px', rot:'-4deg'},
    {left:'40%', height:'68px', rot:'2deg'},
    {left:'52%', height:'75px', rot:'8deg'},
    {left:'64%', height:'63px', rot:'15deg'},
    {left:'76%', height:'70px', rot:'-6deg'},
];
stickData.forEach(d => {
    const s = document.createElement('div');
    s.className = 'stick';
    s.style.cssText = `left:${d.left};height:${d.height};transform:rotate(${d.rot});`;
    sticksEl.appendChild(s);
});

// Build smoke wisps
const smokeEl = document.getElementById('smokeContainer');
for (let i = 0; i < 4; i++) {
    const w = document.createElement('div');
    w.className = 'smoke-wisp';
    w.style.cssText = `left:${20+i*18}%; --sd:${3+i*0.8}s; --sdelay:${i*0.6}s;`;
    smokeEl.appendChild(w);
}

function handleShake() {
    if (isAnimating) return;
    drawFortune();
}

function spawnConfetti() {
    const confetti = document.getElementById('modalConfetti');
    confetti.innerHTML = '';
    const colors = ['#f9d662','#f39c12','#e74c3c','#ff6b6b','#fff','#ffd700'];
    for (let i = 0; i < 20; i++) {
        const dot = document.createElement('div');
        dot.className = 'conf-dot';
        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 120;
        dot.style.cssText = `
            left: ${20 + Math.random()*60}%;
            top: ${20 + Math.random()*60}%;
            background: ${colors[Math.floor(Math.random()*colors.length)]};
            --cx: ${Math.cos(angle)*dist}px;
            --cy: ${Math.sin(angle)*dist}px;
            --cd: ${0.5 + Math.random()*0.6}s;
            --cdelay: ${Math.random()*0.3}s;
        `;
        confetti.appendChild(dot);
    }
}

function openModal(text, numLabel) {
    document.getElementById('modalText').textContent = text;
    document.getElementById('modalNum').textContent = `🥢 ${numLabel}`;
    document.getElementById('modalOverlay').classList.add('open');
    spawnConfetti();
}

function closeModal(e) {
    // only close if clicking the overlay backdrop itself
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.remove('open');
    setTimeout(() => {
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('shakeHint').style.opacity = '';
        isAnimating = false;
    }, 350);
}

function drawFortune() {
    if (isAnimating) return;
    isAnimating = true;

    const btn = document.getElementById('mainBtn');
    const tube = document.getElementById('tubeWrapper');
    const hint = document.getElementById('shakeHint');

    btn.disabled = true;
    hint.style.opacity = '0';

    // Shake tube
    tube.classList.add('shaking');

    setTimeout(() => {
        tube.classList.remove('shaking');

        // Pick fortune (avoid repeat)
        let idx;
        do { idx = Math.floor(Math.random() * fortunes.length); }
        while (idx === lastIndex && fortunes.length > 1);
        lastIndex = idx;

        shakeCount++;
        const numLabel = fortuneNums[Math.floor(Math.random() * fortuneNums.length)];

        document.getElementById('countBadge').textContent =
            `เขย่าแล้ว ${shakeCount} ครั้ง · โชคดีทุกคนนะ 🙏`;

        // Open popup
        openModal(fortunes[idx], numLabel);

    }, 750);
}
</script>
